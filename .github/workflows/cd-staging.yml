name: CD - Deploy to Local Staging

on:
  workflow_run:
    workflows: ['CI - Lint, Tests, Security, Build']
    types: [completed]
    branches: ['17.0', 'main']
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag de l image à déployer (défaut: staging-latest)'
        required: false
        default: 'staging-latest'

env:
  MODULE_NAME: 'pfe'
  IMAGE_NAME: 'ghcr.io/${{ github.repository_owner }}/omega-compta'

jobs:
  deploy-local-staging:
    name: Deploy on local self-hosted runner
    runs-on: self-hosted
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ github.event.inputs.image_tag }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "tag=staging-latest" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull new image
        shell: powershell
        run: |
          docker pull "${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}"

      - name: Backup staging database (if exists)
        shell: powershell
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Force -Path ./backups | Out-Null
          $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
          $running = docker ps -q -f name=omega_compta_staging_db
          if ($running) {
            Write-Host "Backup avant déploiement..."
            docker exec omega_compta_staging_db pg_dump -U odoo staging_db `
              | Out-File -FilePath "./backups/staging_pre_deploy_$timestamp.sql" -Encoding utf8
            Get-ChildItem ./backups | Format-Table Name, Length, LastWriteTime
          } else {
            Write-Host "Aucun container existant — pas de backup nécessaire."
          }

      - name: Deploy with docker-compose
        shell: powershell
        env:
          ODOO_IMAGE: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
        run: |
          Write-Host "Déploiement de l'image: $env:ODOO_IMAGE"
          docker compose -f docker-compose.staging.yml down
          docker compose -f docker-compose.staging.yml up -d

      - name: Wait for Odoo to be ready
        shell: powershell
        run: |
          Write-Host "Attente du démarrage d'Odoo (max 180s)..."
          for ($i = 1; $i -le 36; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri http://localhost:8169/web/login -UseBasicParsing -TimeoutSec 5
              if ($resp.StatusCode -eq 200) {
                Write-Host "Odoo répond sur http://localhost:8169 (après $($i * 5)s)"
                exit 0
              }
            } catch {}
            Start-Sleep -Seconds 5
          }
          Write-Host "::error::Timeout : Odoo ne répond pas sur localhost:8169"
          docker compose -f docker-compose.staging.yml logs odoo --tail=200
          exit 1

      - name: Smoke tests
        shell: powershell
        run: |
          Write-Host "Smoke test 1 : page de login accessible..."
          try {
            $resp = Invoke-WebRequest -Uri http://localhost:8169/web/login -UseBasicParsing
            if ($resp.Content -match "odoo") {
              Write-Host "PASS : page login OK"
            } else {
              Write-Host "::warning::Page login ne contient pas 'odoo'"
            }
          } catch {
            Write-Host "::error::Page login inaccessible : $_"
            exit 1
          }

          Write-Host "Smoke test 2 : module installé..."
          $state = docker exec omega_compta_staging_db psql -U odoo -d staging_db `
            -tAc "SELECT state FROM ir_module_module WHERE name='${{ env.MODULE_NAME }}'"
          if ($state -match "installed") {
            Write-Host "PASS : module installé"
          } else {
            Write-Host "::warning::Module non installé (state: $state)"
          }

          Write-Host "Smoke test 3 : aucune erreur récente dans les logs..."
          $logs = docker compose -f docker-compose.staging.yml logs odoo --tail=200 2>&1
          $errors = ($logs | Select-String -Pattern "ERROR|CRITICAL|Traceback").Count
          if ($errors -gt 0) {
            Write-Host "::warning::$errors message(s) d'erreur récents dans les logs"
            docker compose -f docker-compose.staging.yml logs odoo --tail=50
          } else {
            Write-Host "PASS : pas d'erreurs récentes"
          }

      - name: Cleanup old Docker images
        if: always()
        continue-on-error: true
        shell: powershell
        run: |
          docker image prune -f
          $images = docker images "${{ env.IMAGE_NAME }}" --format "{{.ID}} {{.CreatedAt}}" |
            Sort-Object -Descending | Select-Object -Skip 3
          foreach ($img in $images) {
            $id = ($img -split " ")[0]
            docker rmi -f $id
          }

      - name: Deployment summary
        if: always()
        shell: powershell
        run: |
          Add-Content $env:GITHUB_STEP_SUMMARY "## Déploiement staging"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY "- **Image** : ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}"
          Add-Content $env:GITHUB_STEP_SUMMARY "- **URL** : http://localhost:8169"
          Add-Content $env:GITHUB_STEP_SUMMARY "- **Base** : staging_db"
          Add-Content $env:GITHUB_STEP_SUMMARY "- **Commit** : ${{ github.sha }}"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          docker compose -f docker-compose.staging.yml ps 2>$null |
            Out-String | Add-Content $env:GITHUB_STEP_SUMMARY
