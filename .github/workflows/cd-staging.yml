name: CD - Deploy to Local Staging

# Déclenchement : après le succès du workflow CI (push sur 17.0 ou main)
# OU déclenchement manuel via l'interface GitHub.
on:
  workflow_run:
    workflows: ['CI - Lint, Tests, Security, Build']
    types: [completed]
    branches: ['17.0', 'main']
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag de l image à déployer (défaut: staging-latest)'
        required: false
        default: 'staging-latest'

env:
  MODULE_NAME: 'pfe'
  IMAGE_NAME: 'ghcr.io/${{ github.repository_owner }}/omega-compta'

jobs:
  deploy-local-staging:
    name: Deploy on local self-hosted runner
    # IMPORTANT : self-hosted runner installé sur TA machine.
    # Voir docs/SELF_HOSTED_RUNNER.md pour la procédure d'installation.
    runs-on: self-hosted
    # Ne tourne que si CI a réussi
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=staging-latest" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull new image
        shell: bash
        run: |
          docker pull "${IMAGE_NAME}:${{ steps.tag.outputs.tag }}"

      - name: Backup staging database (if exists)
        shell: bash
        continue-on-error: true
        run: |
          mkdir -p ./backups
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          if docker ps -q -f name=omega_compta_staging_db | grep -q .; then
            echo "Backup avant déploiement..."
            docker exec omega_compta_staging_db pg_dump -U odoo staging_db \
              > "./backups/staging_pre_deploy_${TIMESTAMP}.sql" || \
              echo "::warning::Backup failed (DB probably not initialised yet)"
            ls -lh ./backups/
          else
            echo "Aucun container existant — pas de backup nécessaire."
          fi

      - name: Deploy with docker-compose
        shell: bash
        env:
          ODOO_IMAGE: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
        run: |
          echo "Déploiement de l'image: ${ODOO_IMAGE}"
          docker compose -f docker-compose.staging.yml down
          docker compose -f docker-compose.staging.yml up -d

      - name: Wait for Odoo to be ready
        shell: bash
        run: |
          echo "Attente du démarrage d'Odoo (max 180s)..."
          for i in {1..36}; do
            if curl -fsS http://localhost:8169/web/login >/dev/null 2>&1; then
              echo "Odoo répond sur http://localhost:8169 (après ${i}*5s)"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Timeout : Odoo ne répond pas sur localhost:8169"
          docker compose -f docker-compose.staging.yml logs odoo --tail=200
          exit 1

      - name: Smoke tests
        shell: bash
        run: |
          echo "Smoke test 1 : page de login accessible..."
          curl -fsS http://localhost:8169/web/login | grep -qi 'odoo' && \
            echo "PASS : page login OK"

          echo "Smoke test 2 : module installé..."
          docker exec omega_compta_staging_db psql -U odoo -d staging_db \
            -tAc "SELECT state FROM ir_module_module WHERE name='${MODULE_NAME}'" | \
            grep -q 'installed' && echo "PASS : module installé"

          echo "Smoke test 3 : aucune erreur récente dans les logs..."
          ERRORS=$(docker compose -f docker-compose.staging.yml logs odoo --tail=200 2>&1 | \
            grep -cE "ERROR|CRITICAL|Traceback" || true)
          if [ "${ERRORS}" -gt 0 ]; then
            echo "::warning::${ERRORS} message(s) d'erreur récents dans les logs"
            docker compose -f docker-compose.staging.yml logs odoo --tail=50
          else
            echo "PASS : pas d'erreurs récentes"
          fi

      - name: Cleanup old Docker images
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          # Garde les 3 dernières images, supprime les autres
          docker image prune -f
          docker images "${IMAGE_NAME}" --format "{{.ID}} {{.CreatedAt}}" | \
            sort -k2 -r | tail -n +4 | awk '{print $1}' | \
            xargs -r docker rmi -f || true

      - name: Deployment summary
        if: always()
        shell: bash
        run: |
          echo "## Déploiement staging" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image** : ${IMAGE_NAME}:${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL** : http://localhost:8169" >> $GITHUB_STEP_SUMMARY
          echo "- **Base** : staging_db" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit** : ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          docker compose -f docker-compose.staging.yml ps >> $GITHUB_STEP_SUMMARY || true
