# ──────────────────────────────────────────────────────────────────────────
# Stack STAGING locale — simule un déploiement production sur ta machine.
# Lancement manuel : docker compose -f docker-compose.staging.yml up -d
# Démarré automatiquement par le workflow .github/workflows/cd-staging.yml
# ──────────────────────────────────────────────────────────────────────────
services:
  db:
    image: postgres:15
    container_name: omega_compta_staging_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - staging_pgdata:/var/lib/postgresql/data
    networks:
      - omega_staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  odoo:
    # En CI/CD : image construite et poussée par GitHub Actions sur GHCR.
    # En local manuel : `docker compose build odoo` pour construire depuis Dockerfile.
    image: ${ODOO_IMAGE:-ghcr.io/abdo-aafif/omega-compta:staging-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omega_compta_staging_odoo
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      PORT: 5432
      USER: odoo
      PASSWORD: odoo
      DB_NAME: staging_db
      MODULE_NAME: "315_v3_gev2_claudeCopieCopie"
    ports:
      # Port 8169 (et non 8069) pour ne PAS rentrer en conflit avec
      # ton Odoo natif de développement qui tourne déjà sur 8069.
      - "8169:8069"
      - "8172:8072"
    volumes:
      - staging_odoo_data:/var/lib/odoo
      - ./backups:/backups
    networks:
      - omega_staging
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8069/web/database/selector >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  staging_pgdata:
    name: omega_staging_pgdata
  staging_odoo_data:
    name: omega_staging_odoo_data

networks:
  omega_staging:
    name: omega_staging_net
    driver: bridge
