# Pré-commit hooks pour valider le code AVANT push.
# Installation : pip install pre-commit && pre-commit install
# Lance manuellement : pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-xml
        exclude: ^docs5/
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=2048']

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        args: ['--line-length=120']
        files: ^(models|wizard|tests)/.*\.py$

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args:
          - --max-line-length=120
          - --ignore=E501,W503,E203,E402
        files: ^(models|wizard|tests)/.*\.py$

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile=black', '--line-length=120']
        files: ^(models|wizard|tests)/.*\.py$

  - repo: local
    hooks:
      - id: pylint-odoo
        name: pylint-odoo
        entry: pylint
        language: system
        types: [python]
        args:
          - --rcfile=.pylintrc
          - --load-plugins=pylint_odoo
          - --valid-odoo-versions=17.0
        files: ^(models|wizard|tests)/.*\.py$
        exclude: ^docs5/

exclude: ^(docs5/|__pycache__/|.*\.pyc$)
